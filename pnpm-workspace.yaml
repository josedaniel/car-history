packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@tailwindcss/vite": ^4.2.4
  "@types/node": ^24.12.2
  "@vitejs/plugin-vue": ^6.0.6
  better-auth: ^1.6.9
  better-sqlite3: ^12.9.0
  drizzle-orm: ^0.45.2
  lucide-vue-next: ^1.0.0
  tailwindcss: ^4.2.4
  typescript: ^5.9.3
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.1.19
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vue: ^3.5.33
  vue-tsc: ^3.2.7

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
